<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect 복원
      (function () {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(
            null, null,
            window.location.pathname.split("/").slice(0, 2).join("/") +
            decodeURIComponent(p[1]) +
            (window.location.search.match(/[?&]q=([^&]*)/) || ["", ""])[1]
          );
        }
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeDo | Security Demo Dashboard</title>
