<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect
      // /SecurityDemoDashBoard/sedo/dashboard → index.html?p=/sedo/dashboard
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 2).join("/") +
        "/?p=" + encodeURIComponent(l.pathname.slice(l.pathname.indexOf("/", 1)) + l.search) +
        "&q=" + l.hash.slice(2)
      );
    </script>
  </head>
</html>
